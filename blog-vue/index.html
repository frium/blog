<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="https://static.frium.top/blog/%E6%B5%81%E8%90%A4.jpg"
      type="image/png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frium's blog</title>
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #1a1a2e;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #loading-screen.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      .loading-text {
        color: #e2ba86;
        font-family: "LXGWWenKaiGBScreen", sans-serif;
        font-size: 20px;
        letter-spacing: 4px;
        margin-top: 24px;
      }
      .loading-dots {
        display: flex;
        gap: 8px;
      }
      .loading-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background-color: #e2ba86;
        animation: dotPulse 1.2s ease-in-out infinite;
      }
      .loading-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .loading-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes dotPulse {
        0%,
        80%,
        100% {
          opacity: 0.3;
          transform: scale(0.8);
        }
        40% {
          opacity: 1;
          transform: scale(1.2);
        }
      }
    </style>
  </head>

  <body>
    <div id="app"></div>
    <div id="loading-screen">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div class="loading-text">Loading</div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
